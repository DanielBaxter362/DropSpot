<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropSpot — Leave Your Mark. Find A Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>


</head>
<body>

<header>
  <div class="logo">
    Drop<span>Spot</span>
    <div class="tagline">Make A Mark. Find A Story.</span></div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="locateMe()">📍 My Location</button>
    <button class="btn primary" onclick="openSpotModal()">+ Drop A Spot</button>
    <button class="btn" onclick="logOut()">Log Out</button>
    <button class="btn" onclick="accountSettings()">Manage</button>
  </div>
</header>

<div class="app-body">
  <div id="map"></div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:var(--accent);box-shadow:0 0 6px rgba(232,255,71,0.6)"></div> You are here</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--accent2);box-shadow:0 0 6px rgba(255,107,53,0.4)"></div> Your spot</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--hot);box-shadow:0 0 6px rgba(255,51,102,0.5)"></div> Hotspot (3+ spots)</div>
</div>

<!-- spot Modal -->
<div class="modal-overlay" id="spot-modal">
  <div class="modal">
    <div class="modal-title">Drop a Spot</div>
    <div class="modal-subtitle" id="modal-coords">at your selected location</div>

    <label class="field-label">Title</label>
    <input class="field-input" id="spot-title" type="text" placeholder="Where are you?">

    <label class="field-label">Description</label>
    <textarea class="field-textarea" id="spot-description" placeholder="What's happening here? What do you want to remember?"></textarea>


    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="handleSaveSpot()">Save Spot</button>
    </div>
  </div>
</div>

<div class="zoom-slider-wrap">
    <span class="zoom-label">−</span>
    <div class="zoom-slider-inner">
      <div class="zoom-tooltip" id="zoom-tooltip">z12</div>
      <input type="range" id="zoom-slider" class="zoom-slider"
        min="0" max="6" step="1" value="2">
      <div class="zoom-ticks">
        <div class="zoom-tick"></div>
        <div class="zoom-tick"></div>
        <div class="zoom-tick"></div>
        <div class="zoom-tick"></div>
        <div class="zoom-tick"></div>
        <div class="zoom-tick"></div>
        <div class="zoom-tick"></div>
      </div>
    </div>
  </div>

<script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>
</html>
