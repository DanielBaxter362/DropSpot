<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropSpot — Leave Your Mark. Find A Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


</head>
<body>

<header>
  <div class="logo">
    Drop<span>Spot</span>
    <div class="tagline">Make A Mark. Find A Story.</span></div>
  </div>
  <div class="header-actions">
    <div class="stat-pill">Spots: <b id="spot-count">0</b></div>
    <div class="stat-pill">Hotspots: <b id="hotspot-count">0</b></div>
    <button class="btn" onclick="locateMe()">📍 My Location</button>
    <button class="btn primary" onclick="openSpotModal()">+ Drop A Spot</button>
    <div class="dropdown-wrapper">
      <button class="btn" onclick="toggleDropdown()">Account ▾</button>
        <div class="dropdown-menu" id="dropdown-menu">
          <button class="dropdown-item" onclick="accountSettings()">Account Settings</button>
          <button class="dropdown-item" onclick="logOut()">Log Out</button>
        </div>
    </div>
  </div>
</header>

<div class="app-body">
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Your Spots</span>
      <button class="btn" style="padding:4px 10px;font-size:0.6rem;" onclick="clearAll()">Clear All</button>
    </div>
    <div class="spots-list" id="spots-list">
    </div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:var(--accent);box-shadow:0 0 6px rgba(232,255,71,0.6)"></div> You are here</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--accent2);box-shadow:0 0 6px rgba(255,107,53,0.4)"></div> Your spot</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--hot);box-shadow:0 0 6px rgba(255,51,102,0.5)"></div> Hotspot (3+ spots)</div>
</div>

<!-- spot Modal -->
<div class="modal-overlay" id="spot-modal">
  <div class="modal">
    <div class="modal-title">Drop a Spot</div>
    <div class="modal-subtitle" id="modal-coords">at your selected location</div>

    <label class="field-label">Your Spot</label>
    <textarea class="field-textarea" id="spot-text" placeholder="What's happening here? What do you want to remember?"></textarea>


    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="handleSaveSpot()">Save Spot</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
