<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoNotes — Leave Your Mark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --hot: #ff3366;
    --text: #f0f0f0;
    --muted: #555577;
    --note-bg: #1a1a28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
    font-weight: 700;
  }
  .btn.primary:hover { background: #d4eb00; border-color: #d4eb00; color: #0a0a0f; }

  .stat-pill {
    font-size: 0.68rem;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .stat-pill b { color: var(--accent); }

  /* ── Layout ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    background: var(--bg);
    cursor: crosshair;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #0a0a0f !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
    font-family: 'Space Mono', monospace !important;
  }
  .leaflet-control-zoom a:hover { background: var(--note-bg) !important; color: var(--accent) !important; }
  .leaflet-control-attribution { display: none; }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: width 0.3s;
  }

  .sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .notes-list::-webkit-scrollbar { width: 3px; }
  .notes-list::-webkit-scrollbar-track { background: transparent; }
  .notes-list::-webkit-scrollbar-thumb { background: var(--border); }

  .note-card {
    background: var(--note-bg);
    border: 1px solid var(--border);
    padding: 12px;
    cursor: pointer;
    transition: all 0.15s;
    animation: slideIn 0.25s ease;
  }
  .note-card:hover { border-color: var(--accent); transform: translateX(-2px); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .note-meta {
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .note-text {
    font-size: 0.78rem;
    line-height: 1.5;
    color: var(--text);
  }

  .note-coords {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
  }

  .note-tag {
    display: inline-block;
    font-size: 0.58rem;
    padding: 2px 6px;
    background: var(--border);
    color: var(--accent2);
    margin-top: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.75rem;
    line-height: 2;
  }
  .empty-state .big { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 420px;
    max-width: 95vw;
    padding: 28px;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .modal-subtitle {
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 20px;
    font-style: italic;
  }

  .field-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  .field-input, .field-textarea, .field-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
    resize: none;
    appearance: none;
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus {
    border-color: var(--accent);
  }
  .field-textarea { height: 100px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  /* ── Custom map markers ── */
  .note-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent2);
    border: 2px solid #fff2;
    box-shadow: 0 0 8px rgba(255,107,53,0.6);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .note-dot:hover { transform: scale(1.4); }

  /* Hotspot circle — rendered by Leaflet circle, styled below via CSS class tricks */
  /* We'll use Leaflet's built-in circle with custom options */

  /* Location indicator */
  .you-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #0a0a0f;
    box-shadow: 0 0 0 4px rgba(232,255,71,0.3), 0 0 20px rgba(232,255,71,0.4);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(232,255,71,0.3), 0 0 20px rgba(232,255,71,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(232,255,71,0.1), 0 0 30px rgba(232,255,71,0.2); }
  }

  /* Hotspot legend */
  .legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 800;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #0a0a0f;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 10px 18px;
    z-index: 9998;
    animation: toastIn 0.3s ease;
    letter-spacing: 0.03em;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Popup override */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 0 !important;
    color: var(--text) !important;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5) !important;
    font-family: 'Space Mono', monospace !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; font-size: 0.78rem; line-height: 1.6; }
  .popup-note-text { color: var(--text); margin-bottom: 8px; }
  .popup-meta { font-size: 0.62rem; color: var(--muted); }
  .popup-tag { color: var(--accent2); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .leaflet-popup-close-button { color: var(--muted) !important; font-size: 16px !important; }
</style>
</head>
<body>

<header>
  <div class="logo">Geo<span>Notes</span></div>
  <div class="header-actions">
    <div class="stat-pill">Notes: <b id="note-count">0</b></div>
    <div class="stat-pill">Hotspots: <b id="hotspot-count">0</b></div>
    <button class="btn" onclick="locateMe()">📍 My Location</button>
    <button class="btn primary" onclick="openNoteModal()">+ Drop Note</button>
  </div>
</header>

<div class="app-body">
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Recent Notes</span>
      <button class="btn" style="padding:4px 10px;font-size:0.6rem;" onclick="clearAll()">Clear All</button>
    </div>
    <div class="notes-list" id="notes-list">
      <div class="empty-state">
        <div class="big">📝</div>
        Click anywhere on the map<br>to drop a note.<br><br>
        3+ notes nearby = <b style="color:var(--hot)">hotspot</b>
      </div>
    </div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:var(--accent);box-shadow:0 0 6px rgba(232,255,71,0.6)"></div> You are here</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--accent2);box-shadow:0 0 6px rgba(255,107,53,0.4)"></div> Your note</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--hot);box-shadow:0 0 6px rgba(255,51,102,0.5)"></div> Hotspot (3+ notes)</div>
</div>

<!-- Note Modal -->
<div class="modal-overlay" id="note-modal">
  <div class="modal">
    <div class="modal-title">Drop a Note</div>
    <div class="modal-subtitle" id="modal-coords">at your selected location</div>

    <label class="field-label">Your Note</label>
    <textarea class="field-textarea" id="note-text" placeholder="What's happening here? What do you want to remember?"></textarea>

    <label class="field-label">Tag</label>
    <select class="field-select" id="note-tag">
      <option value="📌 General">📌 General</option>
      <option value="🍕 Food">🍕 Food & Drink</option>
      <option value="🎭 Event">🎭 Event</option>
      <option value="🌿 Nature">🌿 Nature</option>
      <option value="🏛️ History">🏛️ History</option>
      <option value="⚠️ Warn">⚠️ Warning</option>
      <option value="✨ Vibe">✨ Vibe Check</option>
    </select>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let notes = JSON.parse(localStorage.getItem('geonotes') || '[]');
let pendingLatLng = null;
let map, userMarker, hotspotCircles = [], noteMarkers = [];

// ── Init Map ──
map = L.map('map', {
  center: [51.505, -0.09],
  zoom: 13,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© CartoDB',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// ── Click to drop note ──
map.on('click', (e) => {
  pendingLatLng = e.latlng;
  openNoteModal(e.latlng);
});

// ── Custom icon factories ──
function makeNoteIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="note-dot"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

function makeYouIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="you-dot"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

// ── Locate user ──
function locateMe() {
  if (!navigator.geolocation) return toast('Geolocation not supported.');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lon], { icon: makeYouIcon(), zIndexOffset: 1000 }).addTo(map);
    map.flyTo([lat, lon], 15, { duration: 1.2 });
    toast('📍 Location found!');
  }, () => toast('Could not get location.'));
}

// ── Modal ──
function openNoteModal(latlng) {
  if (latlng) {
    document.getElementById('modal-coords').textContent =
      `at ${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
  } else {
    // Use map center if called from header button
    pendingLatLng = map.getCenter();
    document.getElementById('modal-coords').textContent =
      `at map center — move the map first for precision`;
  }
  document.getElementById('note-text').value = '';
  document.getElementById('note-modal').classList.add('open');
  setTimeout(() => document.getElementById('note-text').focus(), 150);
}

function closeModal() {
  document.getElementById('note-modal').classList.remove('open');
  pendingLatLng = null;
}

// Close modal on overlay click
document.getElementById('note-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Save Note ──
function saveNote() {
  const text = document.getElementById('note-text').value.trim();
  if (!text) { toast('Please write something first!'); return; }

  const note = {
    id: Date.now(),
    lat: pendingLatLng.lat,
    lng: pendingLatLng.lng,
    text,
    tag: document.getElementById('note-tag').value,
    time: new Date().toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' })
  };

  notes.push(note);
  localStorage.setItem('geonotes', JSON.stringify(notes));
  closeModal();
  addMarker(note);
  renderSidebar();
  recalcHotspots();
  updateStats();
  toast('Note dropped! 📝');
}

// ── Add Marker ──
function addMarker(note) {
  const popupHtml = `
    <div class="popup-tag">${note.tag}</div>
    <div class="popup-note-text">${escHtml(note.text)}</div>
    <div class="popup-meta">${note.time}</div>
  `;
  const marker = L.marker([note.lat, note.lng], { icon: makeNoteIcon() })
    .addTo(map)
    .bindPopup(popupHtml);
  marker._noteId = note.id;
  noteMarkers.push(marker);
}

// ── Render Sidebar ──
function renderSidebar() {
  const list = document.getElementById('notes-list');
  if (notes.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="big">📝</div>
      Click anywhere on the map<br>to drop a note.<br><br>
      3+ notes nearby = <b style="color:var(--hot)">hotspot</b>
    </div>`;
    return;
  }
  list.innerHTML = [...notes].reverse().map(n => `
    <div class="note-card" onclick="flyTo(${n.lat}, ${n.lng}, ${n.id})">
      <div class="note-meta">
        <span>${n.time}</span>
        <span style="color:var(--accent2)">${n.tag.split(' ')[0]}</span>
      </div>
      <div class="note-text">${escHtml(n.text)}</div>
      <div class="note-coords">${n.lat.toFixed(4)}, ${n.lng.toFixed(4)}</div>
    </div>
  `).join('');
}

function flyTo(lat, lng, id) {
  map.flyTo([lat, lng], 16, { duration: 0.8 });
  const marker = noteMarkers.find(m => m._noteId === id);
  if (marker) setTimeout(() => marker.openPopup(), 900);
}

// ── Hotspots ──
const HOTSPOT_RADIUS = 300; // metres
const HOTSPOT_THRESHOLD = 3;

function recalcHotspots() {
  // Clear old circles
  hotspotCircles.forEach(c => map.removeLayer(c));
  hotspotCircles = [];

  // Find clusters
  const visited = new Set();
  const clusters = [];

  for (let i = 0; i < notes.length; i++) {
    if (visited.has(i)) continue;
    const cluster = [notes[i]];
    visited.add(i);
    for (let j = i + 1; j < notes.length; j++) {
      if (visited.has(j)) continue;
      const dist = haversine(notes[i].lat, notes[i].lng, notes[j].lat, notes[j].lng);
      if (dist <= HOTSPOT_RADIUS) {
        cluster.push(notes[j]);
        visited.add(j);
      }
    }
    if (cluster.length >= HOTSPOT_THRESHOLD) {
      clusters.push(cluster);
    }
  }

  // Draw hotspot circles
  clusters.forEach(cluster => {
    const centerLat = cluster.reduce((s, n) => s + n.lat, 0) / cluster.length;
    const centerLng = cluster.reduce((s, n) => s + n.lng, 0) / cluster.length;
    const intensity = Math.min(cluster.length / 10, 1); // 0–1 scale
    const opacity = 0.12 + intensity * 0.18;

    const circle = L.circle([centerLat, centerLng], {
      radius: HOTSPOT_RADIUS,
      color: '#ff3366',
      fillColor: '#ff3366',
      fillOpacity: opacity,
      weight: 1.5,
      opacity: 0.7
    }).addTo(map);

    circle.bindPopup(`
      <div style="font-family:'Space Mono',monospace;font-size:0.75rem;">
        <div style="color:var(--hot,#ff3366);font-weight:700;margin-bottom:4px;">🔥 HOTSPOT</div>
        <div style="color:#aaa">${cluster.length} notes in this area</div>
      </div>
    `);

    hotspotCircles.push(circle);
  });

  document.getElementById('hotspot-count').textContent = clusters.length;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateStats() {
  document.getElementById('note-count').textContent = notes.length;
}

// ── Clear All ──
function clearAll() {
  if (!confirm('Delete all notes? This cannot be undone.')) return;
  notes = [];
  localStorage.removeItem('geonotes');
  noteMarkers.forEach(m => map.removeLayer(m));
  noteMarkers = [];
  hotspotCircles.forEach(c => map.removeLayer(c));
  hotspotCircles = [];
  renderSidebar();
  updateStats();
  document.getElementById('hotspot-count').textContent = 0;
  toast('All notes cleared.');
}

// ── Toast ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init: load saved notes ──
notes.forEach(n => addMarker(n));
renderSidebar();
recalcHotspots();
updateStats();

// Auto-locate on load
locateMe();
</script>
</body>
</html>
